name: Build usque

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: "386"
            suffix: linux-386
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          - goos: linux
            goarch: mips
            gomips: softfloat
            suffix: linux-mips-softfloat
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            suffix: linux-mipsle-softfloat
          - goos: linux
            goarch: mips64
            gomips: softfloat
            suffix: linux-mips64-softfloat
          - goos: linux
            goarch: mips64le
            gomips: softfloat
            suffix: linux-mips64le-softfloat
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
          - goos: windows
            goarch: arm64
            suffix: windows-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: freebsd
            goarch: amd64
            suffix: freebsd-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: 0
        run: |
          mkdir -p output
          go build -ldflags="-s -w" -o "output/usque-${{ matrix.suffix }}${{ matrix.goos == 'windows' && '.exe' || '' }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: usque-${{ matrix.suffix }}
          path: output/usque-${{ matrix.suffix }}${{ matrix.goos == 'windows' && '.exe' || '' }}
